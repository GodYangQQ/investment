<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0a0e14;
    color: #e4e6eb;
    overflow: hidden;
  }
  body { display: flex; flex-direction: column; }

  /* 顶部标题 */
  .header {
    padding: 10px 20px;
    background: #0f141c;
    border-bottom: 1px solid #1e2530;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 16px;
    font-weight: 600;
    color: #fff;
  }
  .header .meta {
    color: #6b7480;
    font-size: 11px;
  }
  .header .legend {
    display: flex;
    gap: 12px;
    margin-left: auto;
    font-size: 11px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    color: #9ba3ad;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
  }

  /* 工具栏 */
  .toolbar {
    padding: 8px 20px;
    background: #0d1218;
    border-bottom: 1px solid #1e2530;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .toolbar input {
    background: #1a1f26;
    border: 1px solid #2a3340;
    color: #e4e6eb;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    flex: 1;
    min-width: 200px;
    max-width: 280px;
  }
  .btn {
    background: #1a1f26;
    border: 1px solid #2a3340;
    color: #e4e6eb;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: #2a3340; border-color: #4287d4; }
  .btn.active { background: #d44; border-color: #d44; color: #fff; }
  .btn.active.l2 { background: #e69b3f; border-color: #e69b3f; }
  .btn.active.l3 { background: #4caf50; border-color: #4caf50; }
  .btn.active.l4 { background: #4287d4; border-color: #4287d4; }

  /* 桑基条 */
  .sankey-bar {
    height: 120px;
    padding: 12px 20px;
    background: linear-gradient(180deg,#0f141c,#0a0e14);
    border-bottom: 1px solid #1e2530;
    flex-shrink: 0;
    display: flex;
    align-items: stretch;
    gap: 6px;
  }
  .sankey-stage {
    flex: 1;
    background: linear-gradient(180deg, var(--sg-from), var(--sg-to));
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 8px 10px;
    color: #fff;
    transition: all 0.2s;
    border: 2px solid transparent;
    position: relative;
  }
  .sankey-stage:hover { transform: translateY(-2px); border-color: #fff; }
  .sankey-stage.active { border-color: #fff; box-shadow: 0 0 16px rgba(255,255,255,0.3); }
  .sankey-arrow {
    align-self: center;
    color: #4a5260;
    font-size: 16px;
  }
  .sg-name { font-size: 13px; font-weight: 600; }
  .sg-meta { font-size: 10px; opacity: 0.85; margin-top: 2px; }
  .sg-count { font-size: 11px; font-weight: 600; margin-top: 4px; opacity: 0.95; }
  .sg-heat {
    font-size: 11px;
    margin-top: 3px;
    opacity: 0.95;
    color: var(--heat-color, #9ba3ad);
    white-space: nowrap;
  }
  .sg-heat.dim { opacity: 0.5; }
  .sg-heat .heat-stars { font-weight: 700; letter-spacing: 1px; }
  .sg-heat.hot .heat-stars { text-shadow: 0 0 6px var(--heat-color); }
  .sg-heat .heat-stars-empty { color: #3a4350; letter-spacing: 1px; }
  .sg-heat .heat-price { font-weight: 600; }
  .sg-heat .heat-cov { color: #4a5260; font-size: 9px; margin-left: 4px; font-weight: 400; }

  /* Top 10 排行榜 */
  .topboards {
    position: relative;
    padding: 8px 20px;
    background: #0d1218;
    border-bottom: 1px solid #1e2530;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    max-height: 260px;
  }
  .topboards.collapsed { max-height: 36px; }
  .topboards-toggle {
    position: absolute;
    top: 6px;
    right: 16px;
    background: #1a1f26;
    border: 1px solid #2a3340;
    color: #d8dde5;
    width: 28px;
    height: 22px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    line-height: 1;
    z-index: 2;
  }
  .topboards-toggle:hover { background: #2a3340; border-color: #4287d4; }
  .topboard {
    flex: 1;
    background: #0f141c;
    border: 1px solid #1e2530;
    border-radius: 6px;
    padding: 6px 10px 8px;
    min-width: 0;
    overflow: hidden;
  }
  .topboard-title {
    font-size: 12px;
    font-weight: 600;
    color: #d8dde5;
    margin-bottom: 4px;
    letter-spacing: 0.3px;
  }
  .topboard-list { list-style: none; padding: 0; margin: 0; }
  .topboard-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 1px 4px;
    font-size: 11px;
    cursor: pointer;
    border-radius: 3px;
    white-space: nowrap;
    overflow: hidden;
  }
  .topboard-row:hover { background: #1a2332; }
  .topboard-badge {
    background: #e69b3f;
    color: #fff;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.3px;
    padding: 2px 6px;
    border-radius: 3px;
    flex-shrink: 0;
    cursor: help;
    white-space: nowrap;
  }
  .topboard-legend {
    font-size: 9px;
    color: #6b7480;
    font-weight: 400;
    margin-left: 8px;
    letter-spacing: 0;
  }
  .topboard-rank {
    color: #6b7480;
    width: 24px;
    font-family: 'SF Mono', monospace;
    flex-shrink: 0;
    font-size: 10px;
  }
  .topboard-dot {
    width: 7px; height: 7px; border-radius: 50%;
    flex-shrink: 0;
  }
  .topboard-name-wrap {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 0 1 auto;
    min-width: 0;
    max-width: 55%;
    overflow: hidden;
  }
  .topboard-name {
    color: #e4e6eb;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }
  .topboard-row:hover .topboard-name { color: #fff; }
  .topboard-stage {
    color: #6b7480;
    font-size: 9px;
    margin-left: auto;
    flex-shrink: 0;
  }
  .topboard-metric {
    font-weight: 700;
    flex-shrink: 0;
    margin-left: 6px;
    padding-left: 6px;
    font-size: 11px;
    letter-spacing: 0.5px;
  }
  #custom-tooltip {
    position: fixed;
    display: none;
    background: #1a2332;
    color: #fff;
    padding: 8px 12px;
    font-size: 11px;
    line-height: 1.5;
    white-space: pre-line;
    border-radius: 4px;
    border: 1px solid #2a3340;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    pointer-events: none;
    z-index: 10000;
    max-width: 280px;
  }
  .topboard-metric.stars { color: #ffc107; }
  .topboard-metric.price { color: #ff5252; }
  .sg-heat.low-sample { color: #ffc107; cursor: help; }
  .sg-heat.low-sample .heat-stars-empty { color: #5a4a20; }
  .sg-heat.low-sample .heat-cov { color: #ffc107; font-weight: 600; }
  .sg-heat.low-sample .heat-price { color: #ffc107 !important; }

  /* 主区(树状图) */
  .main {
    flex: 1;
    overflow: hidden;
    position: relative;
    background: #0a0e14;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(66,135,212,0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(212,68,68,0.04) 0%, transparent 50%);
  }
  #tree-svg {
    width: 100%;
    height: 100%;
    cursor: grab;
  }
  #tree-svg:active { cursor: grabbing; }

  /* 节点样式 */
  .node circle {
    stroke-width: 2;
    cursor: pointer;
    transition: all 0.2s;
  }
  .node:hover circle { stroke: #fff; }
  .node text {
    font-size: 12px;
    fill: #e4e6eb;
    cursor: pointer;
    pointer-events: all;
    user-select: none;
  }
  .node.dimmed { opacity: 0.15; }
  .node.highlight circle { stroke: #ffeb3b; stroke-width: 3; }
  .node.highlight text { fill: #ffeb3b; font-weight: 600; }

  .link {
    fill: none;
    stroke: #2a3340;
    stroke-width: 1.5;
    transition: opacity 0.2s;
  }
  .link.dimmed { opacity: 0.1; }

  /* 等级颜色 */
  .lvl-1 { fill: #d44; }       /* 卡脖子 */
  .lvl-2 { fill: #e69b3f; }    /* 攻坚 */
  .lvl-3 { fill: #4caf50; }    /* 主导 */
  .lvl-4 { fill: #4287d4; }    /* 全球协作 */
  .lvl-cat { fill: #6b7480; }  /* 分类节点 */

  /* 右侧详情抽屉 */
  .drawer {
    position: fixed;
    top: 0;
    right: -480px;
    width: 480px;
    height: 100vh;
    background: #0f141c;
    border-left: 1px solid #2a3340;
    overflow-y: auto;
    transition: right 0.3s ease;
    z-index: 100;
    box-shadow: -8px 0 32px rgba(0,0,0,0.4);
  }
  .drawer.open { right: 0; }
  .drawer-header {
    padding: 18px 24px;
    border-bottom: 1px solid #1e2530;
    position: sticky;
    top: 0;
    background: #0f141c;
    z-index: 1;
  }
  .drawer-close {
    position: absolute;
    right: 16px;
    top: 16px;
    background: none;
    border: none;
    color: #9ba3ad;
    font-size: 22px;
    cursor: pointer;
  }
  .drawer-close:hover { color: #fff; }
  .drawer-tag {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 8px;
  }
  .drawer h2 {
    font-size: 18px;
    color: #fff;
    margin-bottom: 6px;
  }
  .drawer-path {
    color: #6b7480;
    font-size: 11px;
  }
  .drawer-section {
    padding: 16px 24px;
    border-bottom: 1px solid #1e2530;
  }
  .drawer-label {
    color: #6b7480;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .drawer-value {
    color: #d8dde5;
    font-size: 13px;
    line-height: 1.6;
  }
  .stocks-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .stock-chip {
    background: #1a2533;
    border: 1px solid #2a4055;
    color: #6ea3ff;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-family: 'SF Mono', monospace;
  }
  .note-box {
    background: #1a1810;
    border-left: 3px solid #e69b3f;
    padding: 8px 12px;
    margin-top: 8px;
    color: #d4a87a;
    font-size: 12px;
    border-radius: 0 4px 4px 0;
    line-height: 1.5;
  }

  /* 缩放控件 */
  .zoom-ctrl {
    position: absolute;
    bottom: 16px;
    right: 16px;
    background: #1a1f26;
    border: 1px solid #2a3340;
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .zoom-ctrl button {
    width: 36px;
    height: 36px;
    background: none;
    border: none;
    color: #d8dde5;
    cursor: pointer;
    font-size: 16px;
    border-bottom: 1px solid #2a3340;
  }
  .zoom-ctrl button:hover { background: #2a3340; }
  .zoom-ctrl button:last-child { border-bottom: none; }

  /* 提示 */
  .hint {
    position: absolute;
    bottom: 16px;
    left: 16px;
    background: rgba(15,20,28,0.9);
    border: 1px solid #2a3340;
    padding: 8px 14px;
    border-radius: 6px;
    color: #9ba3ad;
    font-size: 11px;
    pointer-events: none;
  }

  /* 滚动条 */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #0a0e14; }
  ::-webkit-scrollbar-thumb { background: #2a3340; border-radius: 4px; }
  

  /* 弹窗样式 */
  .stock-modal {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6); z-index: 200;
    display: none; align-items: center; justify-content: center;
  }
  .stock-modal.show { display: flex; }
  .stock-modal-box {
    background: #0f141c; border: 1px solid #2a3340; border-radius: 12px;
    padding: 24px; width: 460px; max-width: 90vw;
    max-height: 85vh; overflow-y: auto;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5); position: relative;
  }
  .stock-modal-close {
    position: absolute; right: 12px; top: 12px; background: none; border: none;
    color: #9ba3ad; font-size: 20px; cursor: pointer;
    width: 32px; height: 32px; border-radius: 6px;
  }
  .stock-modal-close:hover { background: #2a3340; color: #fff; }

  /* 匹配节点高亮 */
  .node.match circle { stroke: #fff; stroke-width: 3; filter: drop-shadow(0 0 8px rgba(255,255,255,0.6)); }
  .node.match text { fill: #fff; font-weight: 700; }
</style>
</head>

function getValuation(stockCode) { return valuationDB[stockCode] || null; }
function getIntel(stockCode) { return intelDB[stockCode] || null; }
function getMultiDim(nodeName) { return multiDimDB[nodeName] || null; }
function formatPE(pe) { if(pe===null||pe===undefined)return'N/A';if(pe<0)return'亏损';return pe+'x';}
function getPEColor(pe) { if(pe===null||pe===undefined||pe<0)return'neutral';if(pe<=25)return'positive';if(pe<=50)return'neutral';return'negative';}
function getPEGLabel(peg) { if(peg===null||peg===undefined)return'N/A';if(peg<0)return'亏损';return peg.toFixed(2);}

/* ========== 数据预处理 ========== */
let idCounter = 0;
function annotate(node, path = []) {
  node._id = idCounter++;
  node._path = [...path, node.name];
  node._depth = path.length;
  if (node.children) node.children.forEach(c => annotate(c, node._path));
}
annotate(industry);

function collectLeaves(node, arr=[]) {
  if (!node.children) { arr.push(node); return arr; }
  node.children.forEach(c => collectLeaves(c, arr));
  return arr;
}
const allLeaves = collectLeaves(industry);

function collectAll(node, arr=[]) {
  arr.push(node);
  if (node.children) node.children.forEach(c => collectAll(c, arr));
  return arr;
}
const allNodes = collectAll(industry);

// 为叶子节点添加估值、情报、多维数据
allLeaves.forEach(node => {
  if (node.stocks && node.stocks.length > 0) {
    node._valuations = [];
    node.stocks.forEach(code => {
      const val = getValuation(code);
      if (val) node._valuations.push(Object.assign({code: code}, val));
    });
  }
  const md = getMultiDim(node.name);
  if (md) {
    node._scarcity = md.scarcity;
    node._priceUp = md.priceUp;
    node._pricePct = md.pricePct;
    node._supplyGap = md.supplyGap;
    node._localization = md.localization;
    node._analogy = md.analogy;
    node._techRisk = md.techRisk;
    node._catalyst = md.catalyst;
  }
  // P1.2: 节点重要性权重 = stocks + 2×intelHit + (level=1 ? +3 : 0)
  const stocks = node.stocks || [];
  const intelHit = stocks.filter(s => getIntel(s)).length;
  const lvlBonus = node.level === 1 ? 3 : 0;
  node._weight = stocks.length + 2 * intelHit + lvlBonus;
  node._wStocks = stocks.length;
  node._wIntel = intelHit;
  node._wLvlBonus = lvlBonus;
});

/* ========== 节点重要性 → 半径映射 (6 档分桶, 3→12px) ========== */
function weightToRadius(w) {
  if (w <= 0) return 3;
  if (w <= 2) return 5;
  if (w === 3) return 6.5;
  if (w === 4) return 7.5;
  if (w <= 6) return 9.5;
  return 12;
}

  {from:'#3a2020',to:'#1a1010'},{from:'#3a2820',to:'#1a1410'},{from:'#2a2a3a',to:'#10101a'},
  {from:'#1a2a3a',to:'#10141a'},{from:'#1a3a2a',to:'#10201a'},{from:'#3a1a2a',to:'#1a1014'},
  {from:'#2a1a3a',to:'#14101a'},{from:'#1a2a2a',to:'#101a1a'}
];
const LEVEL_COLOR = {1:'#d44',2:'#e69b3f',3:'#4caf50',4:'#4287d4'};
const LEVEL_NAME  = {1:'🔴 卡脖子',2:'🟠 国产替代中',3:'🟢 国产已主导',4:'🔵 全球协作'};

/* ========== Stage 热度计算 ========== */
function computeStageHeat(stage) {
  const leaves = collectLeaves(stage);
  let sum = 0, n = 0, maxP = 0;
  leaves.forEach(l => {
    const md = getMultiDim(l.name);
    if (!md || typeof md.scarcity !== 'number') return;
    sum += md.scarcity;
    n++;
    if (md.priceUp && md.pricePct > maxP) maxP = md.pricePct;
  });
  if (n === 0) return null;
  const total = leaves.length;
  return { avg: sum / n, stars: Math.round(sum / n), maxPricePct: maxP, hit: n, total: total, lowSample: n / total < 0.3 };
}
function heatColor(stars) {
  if (stars >= 5) return '#ff5252';
  if (stars >= 4) return '#e69b3f';
  if (stars >= 3) return '#ffc107';
  return '#9ba3ad';
}
function priceColor(pct) {
  if (pct >= 50) return '#ff5252';
  if (pct >= 30) return '#e69b3f';
  return '#9ba3ad';
}
function renderHeatLine(stage) {
  const h = computeStageHeat(stage);
  if (!h) return `<div class="sg-heat dim">紧缺 — · 数据待补</div>`;
  const color = heatColor(h.stars);
  const pColor = priceColor(h.maxPricePct);
  const filled = '★'.repeat(h.stars);
  const empty = '☆'.repeat(5 - h.stars);
  const dimCls = h.stars <= 2 ? ' dim' : '';
  const hotCls = h.stars >= 4 ? ' hot' : '';
  const lowCls = h.lowSample ? ' low-sample' : '';
  const titleAttr = h.lowSample ? ' title="样本不足,星级仅供参考"' : '';
  const covPrefix = h.lowSample ? '⚠ ' : '';
  const priceHtml = h.maxPricePct > 0
    ? ` · 最高 <span class="heat-price" style="color:${pColor}">↗${h.maxPricePct}%</span>`
    : '';
  return `<div class="sg-heat${dimCls}${hotCls}${lowCls}" style="--heat-color:${color}"${titleAttr}>紧缺 <span class="heat-stars">${filled}</span><span class="heat-stars-empty">${empty}</span>${priceHtml}<span class="heat-cov">${covPrefix}${h.hit}/${h.total}</span></div>`;
}

function renderTopboards() {
  const scarcityList = allLeaves
    .filter(l => typeof l._scarcity === 'number' && l._scarcity > 0)
    .sort((a, b) =>
      (b._scarcity - a._scarcity) ||
      ((a.level || 99) - (b.level || 99)) ||
      a.name.localeCompare(b.name))
    .slice(0, 10);

  const priceList = allLeaves
    .filter(l => l._priceUp && typeof l._pricePct === 'number' && l._pricePct > 0)
    .sort((a, b) =>
      (b._pricePct - a._pricePct) ||
      ((b._weight || 0) - (a._weight || 0)) ||
      a.name.localeCompare(b.name))
    .slice(0, 10);

  const scRankByLeafId = new Map(scarcityList.map((l, i) => [l._id, i + 1]));
  const prRankByLeafId = new Map(priceList.map((l, i) => [l._id, i + 1]));

  function rowHtml(leaf, rank, metricHtml) {
    const stageLabel = leafToStage.get(leaf._id) || '';
    const dotColor = LEVEL_COLOR[leaf.level] || '#6b7480';
    const scR = scRankByLeafId.get(leaf._id);
    const prR = prRankByLeafId.get(leaf._id);
    let badgeHtml = '';
    if (scR && prR) {
      const stars = '★'.repeat(leaf._scarcity);
      const tooltip = `⚡ 双榜节点\n左榜卡脖子 #${scR} ${stars}\n右榜涨价 #${prR} ↗${leaf._pricePct}%\n= 既卡脖子又涨价,最值得跟踪`;
      badgeHtml = `<span class="topboard-badge" data-tooltip="${tooltip}">⚡双榜</span>`;
    }
    return `<li class="topboard-row" data-id="${leaf._id}">`
      + `<span class="topboard-rank">${String(rank).padStart(2, '0')}.</span>`
      + `<span class="topboard-dot" style="background:${dotColor}"></span>`
      + `<span class="topboard-name-wrap">`
      +   `<span class="topboard-name" data-tooltip="${leaf.name}">${leaf.name}</span>`
      +   badgeHtml
      + `</span>`
      + (stageLabel ? `<span class="topboard-stage">${stageLabel}</span>` : '')
      + metricHtml
      + `</li>`;
  }

  const olScarcity = document.getElementById('list-scarcity');
  const olPrice = document.getElementById('list-price');
  const emptyHtml = '<li style="color:#6b7480;font-size:11px;padding:4px;">暂无数据</li>';

  olScarcity.innerHTML = scarcityList.length
    ? scarcityList.map((l, i) => {
        const s = l._scarcity;
        const stars = '★'.repeat(s) + '☆'.repeat(5 - s);
        return rowHtml(l, i + 1, `<span class="topboard-metric stars">${stars}</span>`);
      }).join('')
    : emptyHtml;

  olPrice.innerHTML = priceList.length
    ? priceList.map((l, i) =>
        rowHtml(l, i + 1, `<span class="topboard-metric price">↗${l._pricePct}%</span>`)
      ).join('')
    : emptyHtml;

  document.querySelectorAll('#topboards .topboard-row').forEach(row => {
    row.addEventListener('click', () => {
      const id = +row.dataset.id;
      const leaf = allLeaves.find(l => l._id === id);
      if (!leaf) return;
      focusNode(leaf);
      setTimeout(() => {
        nodeLayer.selectAll('g.node').classed('highlight', d => d.data._id === id);
        showDetail(leaf);
      }, 150);
    });
  });
}

(function setupCustomTooltip() {
  const tip = document.getElementById('custom-tooltip');
  if (!tip) return;
  let current = null;
  document.addEventListener('mouseover', e => {
    const t = e.target.closest && e.target.closest('[data-tooltip]');
    if (t === current) return;
    current = t;
    if (!t) { tip.style.display = 'none'; return; }
    tip.textContent = t.getAttribute('data-tooltip') || '';
    tip.style.display = 'block';
  });
  document.addEventListener('mousemove', e => {
    if (!current) return;
    const r = tip.getBoundingClientRect();
    let x = e.clientX + 14, y = e.clientY + 14;
    if (x + r.width  > window.innerWidth)  x = e.clientX - r.width  - 14;
    if (y + r.height > window.innerHeight) y = e.clientY - r.height - 14;
    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
  });
  document.addEventListener('mouseout', e => {
    if (!current) return;
    const to = e.relatedTarget;
    if (!to || !to.closest || !to.closest('[data-tooltip]')) {
      tip.style.display = 'none';
      current = null;
    }
  });
})();

/* ========== D3 树状图 ========== */
const svg = d3.select('#tree-svg');
const g = svg.append('g');
const linkLayer = g.append('g').attr('class','links');
const nodeLayer = g.append('g').attr('class','nodes');
const zoom = d3.zoom().scaleExtent([0.2,3]).on('zoom', ev => g.attr('transform', ev.transform));
svg.call(zoom);

function initCollapse(node, depth=0) {
  if (depth>=1 && node.children) node._collapsed = true;
  if (node.children) node.children.forEach(c => initCollapse(c, depth+1));
}
initCollapse(industry);

function getVisibleChildren(node) {
  return node._collapsed ? null : node.children;
}

function update() {
  const root = d3.hierarchy(industry, d => getVisibleChildren(d));
  const treeLayout = d3.tree().nodeSize([28,260]).separation((a,b)=>a.parent===b.parent?1:1.4);
  treeLayout(root);

  const nodes = root.descendants();
  const links = root.links();

  const linkSel = linkLayer.selectAll('path.link').data(links, d => d.target.data._id);
  linkSel.exit().remove();
  linkSel.enter().append('path').attr('class','link').merge(linkSel)
    .attr('d', d3.linkHorizontal().x(d=>d.y).y(d=>d.x));

  const nodeSel = nodeLayer.selectAll('g.node').data(nodes, d => d.data._id);
  nodeSel.exit().remove();

  const nodeEnter = nodeSel.enter().append('g').attr('class','node')
    .attr('transform', d => `translate(${d.y},${d.x})`)
    .on('click', (ev, d) => {
      ev.stopPropagation();
      if (d.data.children) { d.data._collapsed = !d.data._collapsed; update(); }
      else { showDetail(d.data); }
    });

  nodeEnter.append('circle').attr('r', 5);
  nodeEnter.append('title');
  nodeEnter.append('text');

  const nodeMerge = nodeEnter.merge(nodeSel);
  nodeMerge.attr('transform', d => `translate(${d.y},${d.x})`);

  nodeMerge.select('title').text(d => {
    if (d.data.children) return '';
    const w = d.data._weight || 0;
    if (w === 0) return '节点重要性 = 0\n(无关联 A 股 / 无深度情报)';
    const lines = ['节点重要性 = ' + w];
    if (d.data._wStocks) lines.push('关联 A 股: ' + d.data._wStocks + ' 家');
    if (d.data._wIntel) lines.push('深度情报: ' + d.data._wIntel + ' 家');
    if (d.data._wLvlBonus) lines.push('卡脖子加成: +' + d.data._wLvlBonus);
    return lines.join('\n');
  });

  nodeMerge.select('circle')
    .attr('r', d => d.data.children ? 6 : weightToRadius(d.data._weight || 0))
    .attr('class', d => !d.data.children ? (d.data.level ? `lvl-${d.data.level}` : 'lvl-cat') : 'lvl-cat')
    .style('stroke', d => !d.data.children ? LEVEL_COLOR[d.data.level]||'#6b7480' : (d.data._collapsed?'#4287d4':'#6b7480'))
    .style('fill', d => {
      if (d.data.children && d.data._collapsed) return '#0a0e14';
      if (!d.data.children) return LEVEL_COLOR[d.data.level]||'#6b7480';
      return '#6b7480';
    });

  nodeMerge.select('text')
    .attr('dy', '0.32em')
    .attr('x', d => {
      const r = d.data.children ? 6 : weightToRadius(d.data._weight || 0);
      return d.data.children ? -(r + 4) : (r + 4);
    })
    .attr('text-anchor', d => d.data.children?'end':'start')
    .text(d => {
      let txt = d.data.name;
      if (d.data.children) {
        const total = collectLeaves(d.data).length;
        return `${txt} ${d.data._collapsed?'[+'+total+']':''}`;
      }
      const stockCnt = (d.data.stocks||[]).length;
      let badges = '';
      if (d.data._scarcity) badges += ' ' + '★'.repeat(d.data._scarcity) + '☆'.repeat(5-d.data._scarcity);
      if (d.data._priceUp) badges += ' ↗' + (typeof d.data._pricePct === 'number' ? d.data._pricePct + '%' : '');
      return stockCnt > 0 ? `${txt} (${stockCnt})${badges}` : txt + badges;
    })
    .style('font-weight', d => d.data._depth<=1?'700':(d.data._depth===2?'600':'400'))
    .style('font-size', d => d.data._depth===0?'15px':(d.data._depth===1?'13px':'12px'))
    .style('fill', d => d.data._depth===0?'#fff':(d.data._depth===1?'#d8dde5':'#9ba3ad'));
}
update();

function fitToView() {
  const bbox = g.node().getBBox();
  const svgRect = svg.node().getBoundingClientRect();
  const pad = 60;
  const scale = Math.min((svgRect.width-pad*2)/bbox.width, (svgRect.height-pad*2)/bbox.height, 1);
  const tx = (svgRect.width/2)-((bbox.x+bbox.width/2)*scale);
  const ty = (svgRect.height/2)-((bbox.y+bbox.height/2)*scale);
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(tx,ty).scale(scale));
}
setTimeout(fitToView, 100);

document.getElementById('zoom-in').onclick = () => svg.transition().call(zoom.scaleBy,1.3);
document.getElementById('zoom-out').onclick = () => svg.transition().call(zoom.scaleBy,0.77);
document.getElementById('zoom-fit').onclick = () => fitToView();

function expandAll() {
  allNodes.forEach(n => { if (n.children) n._collapsed = false; });
  update();
  nodeLayer.selectAll('g.node').classed('dimmed', false).classed('match', false);
  linkLayer.selectAll('path.link').classed('dimmed', false);
  setTimeout(fitToView, 50);
}
function collapseAll() {
  allNodes.forEach(n => { if (n.children) n._collapsed = (n._depth >= 1); });
  update();
  nodeLayer.selectAll('g.node').classed('dimmed', false).classed('match', false);
  linkLayer.selectAll('path.link').classed('dimmed', false);
  setTimeout(fitToView, 50);
}
document.getElementById('expand-all').onclick = expandAll;
document.getElementById('collapse-all').onclick = collapseAll;

function focusNode(node) {
  let p = node;
  while (p) { if (p.children) p._collapsed = false; p = findParent(p); }
  update();
}
function findParent(target) {
  for (const n of allNodes) { if (n.children && n.children.includes(target)) return n; }
  return null;
}

/* ========== 多选筛选 ========== */
let activeFilters = new Set();
function toggleFilter(level) {
  const btn = document.getElementById('filter-'+level);
  if (activeFilters.has(level)) { activeFilters.delete(level); btn.classList.remove('active'); }
  else { activeFilters.add(level); btn.classList.add('active'); }
  applyMultiFilter();
}
function nodeHasLabel(node, label) { return node.level === label; }
function applyMultiFilter() {
  if (activeFilters.size === 0) {
    nodeLayer.selectAll('g.node').classed('dimmed', false).classed('match', false);
    linkLayer.selectAll('path.link').classed('dimmed', false);
    return;
  }
  allNodes.forEach(n => { if (n.children) n._collapsed = false; });
  update();
  setTimeout(() => {
    const selected = Array.from(activeFilters);
    nodeLayer.selectAll('g.node')
      .classed('dimmed', d => {
        if (d.data.children) return false;
        return !selected.some(l => nodeHasLabel(d.data, l));
      })
      .classed('match', d => {
        if (d.data.children) return false;
        return selected.some(l => nodeHasLabel(d.data, l));
      });
    linkLayer.selectAll('path.link').classed('dimmed', d => {
      const targetLeaves = collectLeaves(d.target.data);
      return !targetLeaves.some(l => selected.some(s => nodeHasLabel(l, s)));
    });
  }, 100);
}
document.querySelectorAll('[data-level]').forEach(btn => {
  btn.onclick = () => toggleFilter(+btn.dataset.level);
});
document.getElementById('filter-clear').onclick = () => {
  activeFilters.clear();
  document.querySelectorAll('[id^="filter-"]').forEach(b => b.classList.remove('active'));
  nodeLayer.selectAll('g.node').classed('dimmed', false).classed('match', false).classed('highlight', false);
  linkLayer.selectAll('path.link').classed('dimmed', false);
  document.getElementById('search').value = '';
};

/* ========== 搜索 ========== */
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) {
    nodeLayer.selectAll('g.node').classed('highlight', false);
    applyMultiFilter();
    return;
  }
  const matches = allNodes.filter(n => {
    if (n.name.toLowerCase().includes(q)) return true;
    if (n.global && n.global.toLowerCase().includes(q)) return true;
    if (n.cn && n.cn.toLowerCase().includes(q)) return true;
    if (n.stocks && n.stocks.some(s => s.includes(q))) return true;
    return false;
  });
  allNodes.forEach(n => { if (n.children) n._collapsed = false; });
  update();
  setTimeout(() => {
    const matchIds = new Set(matches.map(m => m._id));
    nodeLayer.selectAll('g.node')
      .classed('highlight', d => matchIds.has(d.data._id))
      .classed('dimmed', d => !matchIds.has(d.data._id) && !isAncestor(d.data, matches));
    linkLayer.selectAll('path.link').classed('dimmed', d => {
      const subLeaves = collectLeaves(d.target.data);
      return !subLeaves.some(l => matchIds.has(l._id) || matches.some(m=>l._id===m._id));
    });
  }, 100);
});
function isAncestor(node, descendants) {
  if (!node.children) return false;
  const subIds = new Set(collectAll(node).map(n=>n._id));
  return descendants.some(d => subIds.has(d._id));
}

/* ========== 详情抽屉 (v5.1增强版) ========== */
const drawer = document.getElementById('drawer');
document.getElementById('drawer-close').onclick = () => drawer.classList.remove('open');

function showDetail(node) {
  document.getElementById('drawer-name').textContent = node.name;
  document.getElementById('drawer-path').textContent = node._path.slice(0,-1).join(' > ');
  const tag = document.getElementById('drawer-tag');
  if (node.level) {
    tag.textContent = LEVEL_NAME[node.level];
    tag.style.background = LEVEL_COLOR[node.level];
  } else {
    tag.textContent = '分类节点';
    tag.style.background = '#6b7480';
  }

  const body = document.getElementById('drawer-body');
  let html = '';

  if (node._analogy) {
    html += `<div class="drawer-section" style="background:#1a1810;border-left:3px solid #e69b3f;"><div class="drawer-label">🏷️ 一句话秒懂</div><div class="drawer-value" style="color:#d4a87a;font-size:13px;line-height:1.6;">${node._analogy}</div></div>`;
  }

  if (node._scarcity) {
    const stars = '★'.repeat(node._scarcity) + '☆'.repeat(5-node._scarcity);
    const gapText = node._supplyGap ? '有供需缺口' : '供需平衡';
    const priceText = node._priceUp
      ? (typeof node._pricePct === 'number' ? `↗ 涨价 ${node._pricePct}%` : '↗ 涨价(幅度不明)')
      : '价格稳定';
    html += `<div class="drawer-section"><div class="drawer-label">📊 紧缺度 & 价格</div><div style="display:flex;gap:12px;margin-top:8px;"><div style="background:#1a1f26;border:1px solid #2a3340;border-radius:8px;padding:8px 12px;text-align:center;flex:1;"><div style="color:#6b7480;font-size:10px;">紧缺度</div><div style="color:#ffc107;font-size:16px;">${stars}</div></div><div style="background:#1a1f26;border:1px solid #2a3340;border-radius:8px;padding:8px 12px;text-align:center;flex:1;"><div style="color:#6b7480;font-size:10px;">价格趋势</div><div style="color:${node._priceUp?'#4caf50':'#9ba3ad'};font-size:16px;">${priceText}</div></div><div style="background:#1a1f26;border:1px solid #2a3340;border-radius:8px;padding:8px 12px;text-align:center;flex:1;"><div style="color:#6b7480;font-size:10px;">供需</div><div style="color:${node._supplyGap?'#d44':'#4caf50'};font-size:16px;">${gapText}</div></div><div style="background:#1a1f26;border:1px solid #2a3340;border-radius:8px;padding:8px 12px;text-align:center;flex:1;"><div style="color:#6b7480;font-size:10px;">国产化</div><div style="color:#4287d4;font-size:16px;">${node._localization}/5</div></div></div></div>`;
  }

  if (node.role) html += `<div class="drawer-section"><div class="drawer-label">工序定位</div><div class="drawer-value">${node.role}</div></div>`;
  if (node.global) html += `<div class="drawer-section"><div class="drawer-label">全球玩家(份额)</div><div class="drawer-value">${node.global}</div></div>`;
  if (node.cn) html += `<div class="drawer-section"><div class="drawer-label">中国玩家(进度)</div><div class="drawer-value">${node.cn}</div></div>`;

  if (node._techRisk) {
    html += `<div class="drawer-section"><div class="drawer-label">🔬 技术路线 & 替代风险</div><div class="drawer-value" style="color:#e8c8c8;font-size:12px;line-height:1.6;">${node._techRisk}</div></div>`;
  }

  if (node._catalyst) {
    html += `<div class="drawer-section"><div class="drawer-label">🚀 催化剂 / 时间轴</div><div class="drawer-value" style="color:#ccc8e0;font-size:12px;line-height:1.6;">${node._catalyst}</div></div>`;
  }

  if (node.stocks && node.stocks.length > 0) {
    html += `<div class="drawer-section"><div class="drawer-label">关联A股标的 (点击看估值)</div><div class="stocks-list">${node.stocks.map(s => `<span class="stock-chip" onclick="showStockVal('${s}',event)">${s}</span>`).join('')}</div></div>`;
    if (node._valuations && node._valuations.length > 0) {
      node._valuations.forEach(val => {
        const peCls = val.pe2026 > 0 && val.pe2026 <= 25 ? 'pe-good' : (val.pe2026 > 60 ? 'pe-high' : '');
        const grColor = val.growth > 80 ? '#4caf50' : (val.growth > 40 ? '#ffc107' : '#9ba3ad');
        const pegCls = val.peg !== null && val.peg <= 0.5 ? 'positive' : (val.peg !== null && val.peg <= 1.0 ? 'neutral' : 'negative');
        const pegBarCls = val.peg !== null && val.peg <= 0.5 ? 'green' : (val.peg !== null && val.peg <= 1.0 ? 'yellow' : 'red');
        const pegW = Math.min((val.peg !== null && val.peg > 0 ? val.peg : 0) * 50, 100);
        html += `<div class="drawer-section" style="background:#0d1117;"><div class="drawer-label" style="display:flex;align-items:center;gap:8px;"><span style="color:#6ea3ff;font-weight:600;">${val.code}</span><span style="color:#d8dde5;">${val.name}</span><span style="margin-left:auto;font-size:10px;color:#6b7480;">${val.note}</span></div><div class="valuation-grid"><div class="val-card ${peCls}"><div class="val-label">2026E PE</div><div class="val-value ${getPEColor(val.pe2026)}">${formatPE(val.pe2026)}</div></div><div class="val-card"><div class="val-label">营收增速</div><div class="val-value" style="color:${grColor}">${val.growth}%</div></div><div class="val-card"><div class="val-label">PEG</div><div class="val-value ${pegCls}">${getPEGLabel(val.peg)}</div><div class="peg-bar"><div class="peg-fill ${pegBarCls}" style="width:${pegW}%"></div></div></div><div class="val-card"><div class="val-label">2027E PE</div><div class="val-value ${getPEColor(val.pe2027)}">${formatPE(val.pe2027)}</div></div></div></div>`;
      });
    }
  }

  if (node.note) html += `<div class="drawer-section"><div class="drawer-label">关键备注</div><div class="note-box">⚠️ ${node.note}</div></div>`;

  body.innerHTML = html;
  drawer.classList.add('open');
}

svg.on('click', () => drawer.classList.remove('open'));

/* ========== 股票估值弹窗 ========== */
function showStockVal(stockCode, event) {
  if (event) event.stopPropagation();
  const val = getValuation(stockCode);
  let content = '';
  if (!val) {
    content = `<h3 style="color:#9ba3ad;margin-bottom:12px;">${stockCode}</h3><p style="color:#6b7480;">暂无该标的的估值数据</p>`;
  } else {
    const peCls2026 = getPEColor(val.pe2026);
    const grColor = val.growth > 80 ? '#4caf50' : (val.growth > 40 ? '#ffc107' : '#9ba3ad');
    const pegCls = val.peg !== null && val.peg <= 0.5 ? 'green' : (val.peg !== null && val.peg <= 1.0 ? 'yellow' : 'red');
    const pegW = Math.min((val.peg !== null && val.peg > 0 ? val.peg : 0) * 50, 100);
    const pegText = val.peg !== null && val.peg <= 0.5 ? '低估区间' : (val.peg !== null && val.peg <= 1.0 ? '合理区间' : val.peg !== null ? '高估区间' : 'N/A');
    const investAdvice = val.pe2026 > 0 && val.pe2026 <= 25 && val.peg !== null && val.peg <= 0.5 ? '✅ 低估区间，建议重点关注' :
          val.pe2026 > 0 && val.pe2026 <= 40 && val.peg !== null && val.peg <= 1.0 ? '⭕ 估值合理，具备安全边际' :
          val.pe2026 > 60 || (val.peg !== null && val.peg > 1.5) ? '⚠️ 估值偏高，需等待回调' :
          val.pe2026 < 0 ? '⏸️ 当前亏损，主题投资，关注盈利拐点' : '🔍 建议结合基本面综合判断';

    content = `<h3 style="color:#6ea3ff;margin-bottom:4px;">${val.name} <span style="color:#9ba3ad;font-size:13px;">${stockCode}</span></h3><p style="color:#6b7480;font-size:11px;margin-bottom:16px;">${val.note}</p><div class="valuation-grid" style="margin-bottom:16px;"><div class="val-card"><div class="val-label">2025A PE</div><div class="val-value ${getPEColor(val.pe2025)}">${formatPE(val.pe2025)}</div></div><div class="val-card"><div class="val-label">2026E PE</div><div class="val-value ${peCls2026}">${formatPE(val.pe2026)}</div></div><div class="val-card"><div class="val-label">增速</div><div class="val-value" style="color:${grColor}">${val.growth}%</div></div><div class="val-card"><div class="val-label">2027E PE</div><div class="val-value ${getPEColor(val.pe2027)}">${formatPE(val.pe2027)}</div></div></div><div style="background:#1a2332;border:1px solid #2a4055;border-radius:8px;padding:12px;margin-bottom:12px;"><div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span style="color:#6b7480;font-size:11px;">PEG</span><span style="color:${val.peg !== null && val.peg <= 1.0 ? '#4caf50' : '#d44'};font-size:16px;font-weight:700;">${getPEGLabel(val.peg)}</span></div><div class="peg-bar"><div class="peg-fill ${pegCls}" style="width:${pegW}%"></div></div><div style="color:#9ba3ad;font-size:10px;margin-top:6px;">${pegText}</div></div><div style="background:#1a1810;border-left:3px solid #e69b3f;padding:8px 12px;border-radius:0 4px 4px 0;"><div style="color:#d4a87a;font-size:11px;line-height:1.6;">💡 <strong>投资建议</strong><br>${investAdvice}</div></div>`;

    const intel = getIntel(stockCode);
    if (intel) {
      content += `<div style="margin-top:14px;border-top:1px solid #1e2530;padding-top:14px;"><div style="color:#6b7480;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">📋 公司情报追踪</div>${intel.tech?`<div style="background:#0d1a14;border-left:3px solid #4caf50;padding:8px 12px;border-radius:0 4px 4px 0;margin-bottom:6px;"><div style="color:#6b7480;font-size:10px;">🔬 技术</div><div style="color:#c8d5d0;font-size:12px;line-height:1.5;margin-top:3px;">${intel.tech}</div></div>`:''}${intel.expansion?`<div style="background:#0d141a;border-left:3px solid #4287d4;padding:8px 12px;border-radius:0 4px 4px 0;margin-bottom:6px;"><div style="color:#6b7480;font-size:10px;">🏭 扩产</div><div style="color:#c8ced8;font-size:12px;line-height:1.5;margin-top:3px;">${intel.expansion}</div></div>`:''}${intel.supply?`<div style="background:#1a0d14;border-left:3px solid #e69b3f;padding:8px 12px;border-radius:0 4px 4px 0;margin-bottom:6px;"><div style="color:#6b7480;font-size:10px;">🔗 供应链</div><div style="color:#d8d0c8;font-size:12px;line-height:1.5;margin-top:3px;">${intel.supply}</div></div>`:''}${intel.orders?`<div style="background:#0d1a0d;border-left:3px solid #4caf50;padding:8px 12px;border-radius:0 4px 4px 0;margin-bottom:6px;"><div style="color:#6b7480;font-size:10px;">📦 订单</div><div style="color:#c8d5c8;font-size:12px;line-height:1.5;margin-top:3px;">${intel.orders}</div></div>`:''}${intel.risk?`<div style="background:#1a0d0d;border-left:3px solid #d44;padding:8px 12px;border-radius:0 4px 4px 0;"><div style="color:#6b7480;font-size:10px;">⚠️ 风险</div><div style="color:#e8c8c8;font-size:12px;line-height:1.5;margin-top:3px;">${intel.risk}</div></div>`:''}</div>`;
    }
    content += `<p style="color:#4a5260;font-size:10px;margin-top:12px;">数据来源: 2026年5月券商一致预期 · 仅供参考</p>`;
  }
  document.getElementById('stock-modal-content').innerHTML = content;
  document.getElementById('stock-modal').classList.add('show');
}
